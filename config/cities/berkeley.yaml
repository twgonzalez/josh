# Berkeley, CA — City Configuration
# Used for first validation run (compare against Berkeley Fire Evacuation Study)

city_name: "Berkeley"
state: "CA"
state_fips: "06"
county_fips: "001"  # Alameda County
place_fips: "06000"  # Berkeley city FIPS

# OSMnx place query string
osmnx_place: "Berkeley, California, USA"

# Census TIGER city boundary URL
# (Alameda County places shapefile)
tiger_url: "https://www2.census.gov/geo/tiger/TIGER2023/PLACE/tl_2023_06_place.zip"

# Coordinate Reference System
crs: "EPSG:4326"   # WGS84 for storage
analysis_crs: "EPSG:26910"  # UTM Zone 10N for distance calculations (meters)

# City-specific parameter overrides (leave empty to use parameters.yaml defaults).
# Any key listed here replaces the corresponding value from parameters.yaml for
# this city only.  unit_threshold and vc_threshold are propagated automatically
# to all nested scenario configs.  See docs/city_onboarding.md §2d for guidance.
overrides:
  # FHSZ Surge Multiplier — Berkeley-specific
  # Applied to baseline demand when the project site is in FHSZ Zone 2 or 3.
  # Basis: KLD Engineering TR-1381 (Berkeley, March 2024) documents compressed departure
  # windows during the 1991 Oakland–Berkeley Hills Fire. Simultaneous mandatory evacuation
  # produces roughly 1.5× the staggered peak-hour demand used in normal traffic analysis.
  # Source: KLD TR-1381 Figure 14 — observed departure rate during mandatory evacuation order.
  # Requires Berkeley City Council adoption ordinance before use in project determinations.
  fhsz_surge_multiplier: 1.5
# Example additional overrides:
#   unit_threshold: 10   # lower than default (15) when city road network is more constrained;
#                        # must be justified with ITE trip-generation or local study
#   vc_threshold: 0.85   # more conservative than HCM LOS E/F (0.95) if city council adopts it;
#                        # requires adoption ordinance before first project application

# ============================================================
# Employment and Student Demand Parameters
# Source: KLD Engineering AB 747 Study (Berkeley, March 2024)
# ============================================================

# Fraction of working-age population (16+) that is employed
# Source: U.S. Census ACS 2022, Berkeley
employment_rate: 0.62

# Fraction of Berkeley jobs filled by workers commuting in from outside Berkeley
# Source: Census LEHD OnTheMap, 2021 — Alameda County inflow/outflow
commute_in_fraction: 0.45

# University campuses contributing student vehicle demand
# Students assigned to block groups within 0.5 miles of campus centroid (area-weighted)
universities:
  - name: "UC Berkeley"
    enrollment: 45057         # Fall 2023 enrollment (Office of Planning & Analysis)
    student_vehicle_rate: 0.08  # Fraction of enrolled students with a vehicle on campus
    location_lat: 37.8724
    location_lon: -122.2595

# Key evacuation routes for validation (from Berkeley study)
# These should appear in the output for cross-check
known_evacuation_routes:
  - "Tunnel Road"
  - "Fish Ranch Road"
  - "Grizzly Peak Boulevard"
  - "Claremont Avenue"
  - "College Avenue"

# ============================================================
# Mobilization Factor — Local Study (highest legal defensibility)
# See docs/city_onboarding.md for how to set this for other cities.
# ============================================================

# Source type — one of: local_study | comparable_city | state_guidance | conservative_default
mobilization_source: "local_study"

# Peak-hour mobilization factor for this city.
# Override here to replace the parameters.yaml default for any city.
peak_hour_mobilization: 0.57

# Full citation for legal audit trail and determination brief
mobilization_citation: >
  KLD Engineering TR-1381, Berkeley AB 747 Fire Evacuation Capacity Study
  (March 2024), Figure 12. Derived from Caltrans PeMS loop detector counts
  on primary hill corridors during 2017–2018 Northern California fire
  evacuations, calibrated against post-event survey data from the 1991
  Oakland–Berkeley Hills Fire (NFPA 502 study, UC Berkeley IURD 1993).

# Human-readable note displayed in audit trail and brief methodology section
mobilization_note: >
  Factor derived from observed traffic counts during actual wildfire evacuations
  in the Berkeley/Oakland Hills. Empirical basis is the strongest available
  standard for AB 747 legal defensibility.

# Notes
notes: >
  Berkeley Hills in FHSZ Zones 2-3. First city analyzed for MVP validation.
  Compare v/c ratios against published Berkeley Fire Evacuation Capacity Study.
  Target accuracy: within 10% of published values for primary evacuation routes.

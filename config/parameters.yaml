# Fire Evacuation Capacity Analysis — Default Parameters
# All thresholds and factors used in objective standards calculations.
# These values must be explicitly cited in any legal documentation.
# Override city-specific values in config/cities/{city}.yaml

# ============================================================
# Objective Standards Thresholds
# ============================================================

# Volume-to-capacity threshold triggering discretionary review
# Basis: LOS E/F boundary per Highway Capacity Manual 2022
vc_threshold: 0.80

# Minimum dwelling units triggering Standards review
# Basis: CEQA categorical exemption threshold for residential projects
unit_threshold: 50

# Evacuation route search radius from project location (miles)
# Basis: Standard 3, defined in objective standards ordinance
evacuation_route_radius_miles: 0.5

# ============================================================
# Vehicle Generation (Standard 4 inputs)
# ============================================================

# Average vehicles per household
# Source: U.S. Census American Community Survey (ACS)
vehicles_per_unit: 2.5

# Peak hour mobilization factor (fraction of households mobilizing per hour)
# Source: Berkeley Fire Evacuation Study
peak_hour_mobilization: 0.57

# AADT to peak hour conversion factor (if hourly data unavailable)
# Source: Standard traffic engineering practice
aadt_peak_hour_factor: 0.10

# ============================================================
# HCM 2022 Capacity Table (passenger cars per hour)
# Source: Highway Capacity Manual, 7th Edition (2022)
# ============================================================

hcm_capacity:
  freeway:
    capacity_per_lane: 2250   # pc/h per lane, conservative estimate
  multilane:
    capacity_per_lane: 1900   # pc/h per lane
  two_lane:
    # Capacity by posted speed limit (mph)
    by_speed:
      20: 900
      25: 1125
      30: 1350
      35: 1575
      40: 1700
      45: 1700
      50: 1700
      55: 1700
      65: 1700

# ============================================================
# Road Type Classification (OSM highway tag → HCM type)
# ============================================================

road_type_mapping:
  freeway:
    - motorway
    - motorway_link
    - trunk
    - trunk_link
  multilane:
    - primary
    - primary_link
    - secondary
    - secondary_link
  two_lane:
    - tertiary
    - tertiary_link
    - residential
    - living_street
    - unclassified
    - road

# ============================================================
# Lane Count Estimates (when OSM data is missing)
# ============================================================

lane_defaults:
  motorway: 3
  motorway_link: 2
  trunk: 2
  trunk_link: 1
  primary: 2
  primary_link: 1
  secondary: 2
  secondary_link: 1
  tertiary: 1
  tertiary_link: 1
  residential: 1
  living_street: 1
  unclassified: 1
  road: 1

# ============================================================
# Speed Defaults (mph) when OSM maxspeed is missing
# ============================================================

speed_defaults:
  motorway: 65
  motorway_link: 45
  trunk: 55
  trunk_link: 35
  primary: 45
  primary_link: 35
  secondary: 35
  secondary_link: 25
  tertiary: 25
  tertiary_link: 20
  residential: 25
  living_street: 15
  unclassified: 25
  road: 25

# ============================================================
# LOS (Level of Service) Thresholds
# Source: HCM 2022
# ============================================================

los_thresholds:
  A: 0.10
  B: 0.20
  C: 0.40
  D: 0.60
  E: 0.95
  F: 999.0   # anything above E

# ============================================================
# Data Caching
# ============================================================

# Days before cached data is considered stale and re-downloaded
cache_ttl_days: 90

# ============================================================
# FHSZ Zone Configuration
# Source: CAL FIRE Office of State Fire Marshal
# ============================================================

# ============================================================
# Census ACS Configuration
# Source: U.S. Census Bureau American Community Survey 5-year estimates
# Used for housing-unit-weighted evacuation demand baseline (Agent 2)
# ============================================================

census:
  acs_year: 2022
  housing_units_table: "B25001_001E"    # Total housing units per block group
  population_table: "B01001_001E"       # Total population (for employee fallback)
  api_base: "https://api.census.gov/data"
  max_origins: 100                       # Max block group origin points for network path analysis
  lodes_year: 2021                       # LEHD LODES data year (2021 is latest in LODES8)
  # api_key: ""                          # Optional Census API key (not required; avoids rate limits)

# ============================================================
# Evacuation Demand Baseline Method
# Controls how baseline_demand_vph is computed for evacuation route segments.
# ============================================================

evacuation_demand:
  method: "catchment"
  # "catchment" — use census housing-unit-weighted catchment per segment
  #   formula: catchment_housing_units × vehicles_per_unit × peak_hour_mobilization
  #   requires: Census block group data downloaded by Agent 1
  # "road_class" — flat utilization rate by road class (legacy behavior)
  #   use this when Census data is unavailable or for backward compatibility

# ============================================================
# Evacuation Demand Model — KLD Engineering AB 747 Methodology
# Buffer-based demand for ALL road segments (Phase 2b+)
# Source: KLD Engineering TR-1381 (Berkeley AB 747 Study, March 2024)
# ============================================================

demand:
  # Radius around each road segment to collect resident/employee/student demand
  # Source: KLD Engineering AB 747 methodology (Berkeley study)
  buffer_radius_miles: 0.25

  # Fraction of households that mobilize per hour during peak evacuation
  # Source: Figure 12, KLD Engineering AB 747 study (Berkeley, 2024)
  resident_mobilization: 0.57

  # Employee mobilization: daytime scenario — all employees must evacuate
  # Source: KLD Engineering AB 747 methodology
  employee_mobilization_day: 1.00

  # Employee mobilization: nighttime/weekend scenario
  employee_mobilization_night: 0.10

  # Student mobilization (same as daytime employee for max demand scenario)
  student_mobilization_day: 1.00

  # Vehicles per housing unit
  # Source: U.S. Census American Community Survey (ACS)
  vehicles_per_unit: 2.5

  # Vehicles per employee (all commute alone for evacuation planning)
  employee_vehicle_occupancy: 1.0

  # Demand scenario — "maximum" uses day mobilization rates
  # "minimum" would use night rates (not yet implemented)
  scenario: "maximum"

fhsz:
  # Zones 2 and 3 trigger the objective standards
  trigger_zones:
    - 2
    - 3
  # CAL FIRE FRAP ArcGIS REST API — HHZ_ref_FHSZ service, layer 0
  # Field: FHSZ9 (values: SRA_VeryHigh, LRA_High, FRA_Moderate, etc.)
  api_base: "https://egis.fire.ca.gov/arcgis/rest/services/FRAP/HHZ_ref_FHSZ/MapServer"

# ============================================================
# Three-Tier Determination Configuration
# Cities can override thresholds per tier in their city config.
# All thresholds are 100% algorithmic — zero discretion permitted.
# ============================================================

determination_tiers:
  discretionary:
    # Triggers: size >= threshold AND capacity exceeded (Standard 4)
    # Fire zone location is a severity modifier recorded in audit trail, NOT a gate
    # Legal basis: AB 747 (California Government Code §65302.15) + HCM 2022
    unit_threshold: 50    # minimum dwelling units; if absent, inherits unit_threshold
    vc_threshold: 0.80    # v/c exceedance trigger; if absent, inherits vc_threshold
    legal_basis: "AB 747 (Gov. Code §65302.15) and HCM 2022 v/c capacity threshold — project adds vehicles to evacuation routes operating at or above LOS E/F (citywide evacuation scenario)"

  conditional_ministerial:
    # Triggers: city has FHSZ zones + size >= threshold + serving evacuation routes exist
    # Ministerial approval eligible with mandatory evacuation conditions to be defined by city.
    # Legal basis: General Plan Safety Element consistency + AB 1600 nexus
    #   (project adds vehicles to shared evacuation network regardless of location)
    unit_threshold: 50    # minimum dwelling units; if absent, inherits unit_threshold
    legal_basis: "General Plan Safety Element consistency and AB 1600 nexus (project adds vehicles to shared evacuation network regardless of project location)"

  ministerial:
    # Default when neither DISCRETIONARY nor CONDITIONAL conditions are met:
    #   - project below size threshold, OR
    #   - no serving evacuation routes identified, OR
    #   - city has no FHSZ zones (framework not applicable)
    legal_basis: "Project below applicable significance threshold; ministerial approval eligible without evacuation conditions"

# ============================================================
# Standard 5: Local Evacuation Density (SB 79 / Transit-Adjacent)
# Legal basis: Government Code §65302(g) — General Plan Safety Element;
#              California Fire Code 503 — fire apparatus access;
#              SB 79 (2025) — objective health and safety standard carve-out.
#
# STATUS: Disabled by default. Requires GTFS transit data for activation.
# Enable by setting enabled: true once transit data is configured.
# See legal.md §Scenario B for activation requirements.
# ============================================================

local_density:
  # Master switch — set true to activate Standard 5 evaluation
  enabled: true

  # Minimum dwelling units to trigger Standard 5 analysis
  unit_threshold: 50

  # Volume-to-capacity threshold (same as wildland scenario for consistency)
  vc_threshold: 0.80

  # Buffer radius around project to collect local egress roads
  # Source: KLD Engineering quarter-mile methodology
  radius_miles: 0.25

  # Gate Standard 5 on transit proximity (SB 79 by-right projects)
  # Set true when GTFS data is available (Phase 3 feature)
  require_transit_proximity: false

  # Transit station buffer for SB 79 applicability gate
  # Source: SB 79 — 0.5 mile (2,640 feet) from qualifying transit station
  transit_buffer_feet: 2640

  # Road types counted as local egress routes (freeways excluded)
  local_egress_road_types:
    - multilane
    - two_lane

  legal_basis: "Government Code §65302(g) — General Plan Safety Element evacuation route capacity; California Fire Code 503 — fire apparatus access road capacity; SB 79 (2025) objective health and safety standard carve-out"
